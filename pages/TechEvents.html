    <script>
        // Global variables
        let currentSlide = 0;
        let totalSlides = 0;
        let slidesToShow = 1;
        let slideWidth = 0;
        let filteredCards = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let allEvents = [];

        // Event status calculation functions
        function calculateEventStatus(event) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            // Parse start date
            let startDate;
            if (event.startDate) {
                startDate = new Date(event.startDate);
            } else if (event.date && event.date !== 'Coming Soon' && event.date !== 'Ongoing') {
                // Parse date string - handle various formats
                let dateStr = event.date;
                if (dateStr.includes(',')) {
                    const parts = dateStr.split(',');
                    if (parts.length >= 2) {
                        dateStr = parts[0] + ', ' + parts[1].trim().split(' ')[0];
                    }
                }
                startDate = new Date(dateStr);
            } else {
                // Default to future for "Coming Soon" events
                return {
                    status: 'coming-soon',
                    statusLabel: 'Coming Soon'
                };
            }

            // Parse end date
            let endDate;
            if (event.endDate) {
                endDate = new Date(event.endDate);
            } else {
                // Default to same day as start date if no end date specified
                endDate = new Date(startDate);
                endDate.setHours(23, 59, 59, 999); // End of day
            }

            const startDateOnly = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
            const endDateOnly = new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate());

            // Determine status based on dates
            if (startDateOnly > today) {
                return {
                    status: 'coming-soon',
                    statusLabel: 'Coming Soon'
                };
            } else if (startDateOnly <= today && endDateOnly >= today) {
                return {
                    status: 'now',
                    statusLabel: 'Happening Now!'
                };
            } else {
                return {
                    status: 'past',
                    statusLabel: 'Past'
                };
            }
        }

        function enrichEventWithStatus(event) {
            const statusInfo = calculateEventStatus(event);
            return {
                ...event,
                status: statusInfo.status,
                statusLabel: statusInfo.statusLabel
            };
        }

        // Dynamic Event Rendering
        function renderEventCards() {
            if (!portfolioData || !portfolioData.events) {
                console.error('Portfolio data or events not found');
                return;
            }

            // Enrich events with dynamic status calculation
            allEvents = portfolioData.events.map(event => enrichEventWithStatus(event));

            // Sort events reverse-chronologically within each section; alpha by title for ties
            const sortedEvents = [...allEvents].sort((a, b) => {
                const getDate = (ev) => ev.startDate ? new Date(ev.startDate) : new Date(0);
                const dateDiff = getDate(b).getTime() - getDate(a).getTime(); // reverse chron
                if (dateDiff !== 0) return dateDiff;
                return a.title.localeCompare(b.title); // alpha by title for ties
            });

            const upcomingEvents = sortedEvents.filter(e => e.status === 'coming-soon');
            const ongoingEvents  = sortedEvents.filter(e => e.status === 'now');
            const pastEvents     = sortedEvents.filter(e => e.status === 'past');

            document.getElementById('upcoming-grid').innerHTML = upcomingEvents.map(createEventCardHTML).join('');
            document.getElementById('ongoing-grid').innerHTML  = ongoingEvents.map(createEventCardHTML).join('');
            document.getElementById('past-grid').innerHTML     = pastEvents.map(createEventCardHTML).join('');

            // Hide empty sections
            ['upcoming', 'ongoing', 'past'].forEach(key => {
                const section = document.getElementById(key + '-section');
                const grid    = document.getElementById(key + '-grid');
                section.classList.toggle('hidden', grid.children.length === 0);
            });

            // Update initial count
            document.getElementById('event-count').textContent = sortedEvents.length;
        }

        function createEventCardHTML(event) {
            const statusClass = getStatusClass(event.status);
            const linkedInLink = event.linkedInLink || event.link; // Fallback to old 'link' field for backwards compatibility
            const linkIcon = linkedInLink && linkedInLink.includes('linkedin.com/events') ? 'fab fa-linkedin' : 'fab fa-linkedin';

            // Build buttons HTML
            let buttonsHTML = '';

            // Primary LinkedIn button (always shown if linkedInLink exists)
            if (linkedInLink) {
                buttonsHTML += `
                    <a href="${linkedInLink}" target="_blank" rel="noopener noreferrer" class="event-link">
                        <i class="${linkIcon}" style="margin-right: 0.5rem;"></i>Learn More
                    </a>
                `;
            }

            // Secondary buttons (conditional)
            if (event.blogLink) {
                buttonsHTML += `
                    <a href="${event.blogLink}" target="_blank" rel="noopener noreferrer" class="event-link secondary">
                        <i class="fas fa-book-open" style="margin-right: 0.5rem;"></i>Read
                    </a>
                `;
            }

            if (event.podcastLink) {
                buttonsHTML += `
                    <a href="${event.podcastLink}" target="_blank" rel="noopener noreferrer" class="event-link secondary">
                        <i class="fas fa-podcast" style="margin-right: 0.5rem;"></i>Listen
                    </a>
                `;
            }

            if (event.videoLink) {
                buttonsHTML += `
                    <a href="${event.videoLink}" target="_blank" rel="noopener noreferrer" class="event-link secondary">
                        <i class="fab fa-youtube" style="margin-right: 0.5rem;"></i>Watch
                    </a>
                `;
            }

            if (event.showcaseLink) {
                buttonsHTML += `
                    <a href="${event.showcaseLink}" target="_blank" rel="noopener noreferrer" class="event-link secondary">
                        <i class="fas fa-gem" style="margin-right: 0.5rem;"></i>Event Showcase
                    </a>
                `;
            } else if (event.lumaEventId) {
                buttonsHTML += `
                    <a href="https://lu.ma/event/${event.lumaEventId}" class="luma-checkout--button event-link secondary" data-luma-action="checkout" data-luma-event-id="${event.lumaEventId}">
                        <i class="fas fa-ticket-alt" style="margin-right: 0.5rem;"></i>Register for Event
                    </a>
                `;
            }

            return `
                <div class="event-card" id="${event.id}" data-status="${event.status}" data-search="${event.searchTerms.toLowerCase()}">
                    <div class="event-status ${statusClass}">${event.statusLabel}</div>
                    <div class="event-image">
                        <i class="${event.icon}"></i>
                    </div>
                    <div class="event-content">
                        <h3 class="event-title">${event.title}</h3>
                        <div class="event-date"><i class="fas fa-calendar"></i> ${event.date}</div>
                        <div class="event-location"><i class="fas fa-map-marker-alt"></i> ${event.location}</div>
                        <div class="event-organization"><i class="fas fa-users"></i> ${event.organization}</div>
                        ${event.audience ? `<div class="event-organization"><i class="fas fa-user-tag"></i> ${event.audience}</div>` : ''}
                        <div class="event-description">
                            ${event.description}
                        </div>
                        <div class="event-links">
                            ${buttonsHTML}
                        </div>
                    </div>
                </div>
            `;
        }

        function getStatusClass(status) {
            switch(status) {
                case 'coming-soon': return 'upcoming';
                case 'now': return 'happening-now';
                case 'past': return 'past';
                default: return 'upcoming';
            }
        }

        // Utility functions for easy event management
        function getEventsByStatus(status) {
            return allEvents.filter(event => {
                const eventStatus = calculateEventStatus(event);
                return eventStatus.status === status;
            });
        }

        function getEventCounts() {
            return {
                total: allEvents.length,
                comingSoon: getEventsByStatus('coming-soon').length,
                happeningNow: getEventsByStatus('now').length,
                past: getEventsByStatus('past').length
            };
        }

        function addNewEvent(eventData) {
            // Helper function for future event additions
            // Validates required fields and adds to portfolio data
            const requiredFields = ['id', 'title', 'status', 'statusLabel', 'date', 'location', 'organization', 'description', 'icon', 'link', 'searchTerms'];

            const missingFields = requiredFields.filter(field => !eventData[field]);
            if (missingFields.length > 0) {
                console.error('Missing required fields:', missingFields);
                return false;
            }

            portfolioData.events.push(eventData);
            renderEventCards();
            initializeSearchAndFilter();
            return true;
        }

        // Search and Filter functionality
        function initializeSearchAndFilter() {
            const searchInput = document.getElementById('event-search');
            const clearBtn = document.getElementById('clear-search');
            const filterButtons = document.querySelectorAll('.filter-btn');

            // Search functionality
            searchInput.addEventListener('input', function() {
                currentSearch = this.value.toLowerCase();
                clearBtn.style.display = currentSearch ? 'block' : 'none';
                filterEvents();
            });

            // Clear search
            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                currentSearch = '';
                this.style.display = 'none';
                filterEvents();
                searchInput.focus();
            });

            // Filter functionality
            filterButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    // Update active filter button
                    filterButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    currentFilter = this.dataset.filter;
                    filterEvents();
                });
            });

            // Initial filter
            filterEvents();
        }

        function filterEvents() {
            const allCards = document.querySelectorAll('.event-card');
            let visibleCount = 0;

            allCards.forEach(card => {
                const matchesFilter = currentFilter === 'all' || card.dataset.status === currentFilter;
                const matchesSearch = !currentSearch || card.dataset.search.includes(currentSearch);
                card.classList.toggle('hidden', !(matchesFilter && matchesSearch));
                if (matchesFilter && matchesSearch) visibleCount++;
            });

            document.getElementById('event-count').textContent = visibleCount;

            // Show/hide sections based on visible cards within them
            ['upcoming', 'ongoing', 'past'].forEach(key => {
                const section = document.getElementById(key + '-section');
                const hasVisible = section.querySelectorAll('.event-card:not(.hidden)').length > 0;
                section.classList.toggle('hidden', !hasVisible);
            });

            const noResults = document.getElementById('no-results');
            const container = document.getElementById('events-grid-container');
            noResults.classList.toggle('show', visibleCount === 0);
            container.style.display = visibleCount === 0 ? 'none' : '';
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            initializeTheme();
            renderEventCards(); // Render events from portfolio_data.js
            initializeSearchAndFilter();

            // Smooth scroll behavior for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });

            // Fade in animation on scroll
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.animationDelay = '0.2s';
                        entry.target.style.animationPlayState = 'running';
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.fade-in').forEach(el => {
                el.style.animationPlayState = 'paused';
                observer.observe(el);
            });
        });
    </script>
